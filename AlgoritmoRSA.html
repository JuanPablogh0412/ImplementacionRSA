<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Implementación algoritmo RSA</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #080c10;
    --panel:    #0d1219;
    --card:     #111820;
    --border:   #1e2d3d;
    --border2:  #2a3f55;
    --green:    #00e5a0;
    --green2:   #00b87c;
    --cyan:     #38bdf8;
    --yellow:   #fbbf24;
    --red:      #f87171;
    --magenta:  #c084fc;
    --orange:   #fb923c;
    --white:    #e2eaf4;
    --gray:     #64748b;
    --gray2:    #94a3b8;
    --mono:     'JetBrains Mono', monospace;
    --sans:     'Outfit', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }


  .app { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 0 24px 48px; }

  /* ── HEADER ── */
  header {
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
  }
  .logo h1 { font-size: 24px; font-weight: 600; color: var(--white); letter-spacing: -0.3px; }

  /* ── LAYOUT ── */
  .layout { display: grid; grid-template-columns: 320px 1fr; gap: 20px; align-items: start; }
  @media(max-width: 820px) { .layout { grid-template-columns: 1fr; } }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    position: sticky; top: 20px;
  }
  .sidebar-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    color: var(--cyan); letter-spacing: 2px; text-transform: uppercase;
  }

  /* ── STEP BLOCKS ── */
  .step-block { padding: 20px; border-bottom: 1px solid var(--border); transition: background .2s; }
  .step-block.active   { background: rgba(0,229,160,.04); }
  .step-block.done     { background: rgba(0,229,160,.02); }
  .step-block.disabled { opacity: .4; pointer-events: none; }

  .step-label {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  }
  .step-num {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--border2); color: var(--gray2);
    font-family: var(--mono); font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: all .3s; flex-shrink: 0;
  }
  .step-block.active  .step-num { background: var(--green); color: #000; }
  .step-block.done    .step-num { background: var(--border2); color: var(--green); border: 1px solid var(--green2); }
  .step-title { font-size: 13px; font-weight: 600; color: var(--white); font-family: var(--mono); }

  .step-input {
    width: 100%; padding: 10px 14px;
    background: var(--card); border: 1px solid var(--border2); border-radius: 8px;
    color: var(--white); font-family: var(--mono); font-size: 16px; font-weight: 500;
    text-align: center; outline: none; transition: all .2s; margin-bottom: 10px;
  }
  .step-input:focus { border-color: var(--cyan); }
  .step-input:disabled { opacity: .4; cursor: not-allowed; }
  .step-input.ok    { border-color: var(--green2); }
  .step-input.error { border-color: var(--red); }

  .step-btn {
    width: 100%; padding: 10px;
    border: none; border-radius: 8px; cursor: pointer;
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    letter-spacing: .5px; transition: all .2s;
  }
  .step-btn.cyan    { background: var(--cyan);    color: #000; }
  .step-btn.yellow  { background: var(--yellow);  color: #000; }
  .step-btn.green   { background: var(--green);   color: #000; }
  .step-btn:hover:not(:disabled) { filter: brightness(1.1); }
  .step-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }

  .step-done-badge {
    display: none; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 12px; color: var(--green);
  }
  .step-block.done .step-done-badge { display: flex; }
  .step-block.done .step-input,
  .step-block.done .step-btn { display: none; }

  .done-value { font-weight: 700; color: var(--green); font-size: 14px; }

  .reset-btn {
    display: block; width: calc(100% - 40px); margin: 16px 20px;
    padding: 10px; background: transparent;
    border: 1px solid rgba(248,113,113,.3); border-radius: 8px;
    color: var(--red); font-family: var(--mono); font-size: 12px;
    font-weight: 600; cursor: pointer; transition: all .2s; letter-spacing: .5px;
  }
  .reset-btn:hover { background: rgba(248,113,113,.08); border-color: var(--red); }

  /* ── RESULT CARD ── */
  .result-card {
    margin: 0 20px 20px;
    background: linear-gradient(135deg, rgba(0,229,160,.08), rgba(56,189,248,.04));
    border: 1px solid rgba(0,229,160,.25); border-radius: 12px;
    padding: 14px 16px;
    display: none;
  }
  .result-card.visible { display: block; animation: fadeSlide .4s ease; }
  @keyframes fadeSlide { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: none; } }
  .result-title { font-family: var(--mono); font-size: 10px; color: var(--cyan); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
  .result-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-family: var(--mono); font-size: 13px; }
  .result-row .lbl { color: var(--gray2); }
  .result-row .val { font-weight: 700; }
  .result-divider { height: 1px; background: var(--border); margin: 8px 0; }
  .key-pub  { font-family: var(--mono); font-size: 11px; color: var(--green);   padding: 3px 0; }
  .key-priv { font-family: var(--mono); font-size: 11px; color: var(--magenta); padding: 3px 0; }

  /* ── LOG PANEL ── */
  .log-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    display: flex; flex-direction: column;
    min-height: 600px;
  }
  .log-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .log-title { font-family: var(--mono); font-size: 11px; color: var(--cyan); letter-spacing: 2px; text-transform: uppercase; }
  .log-dots { display: flex; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-r { background: #f87171; }
  .dot-y { background: #fbbf24; }
  .dot-g { background: #4ade80; }

  #logOutput {
    flex: 1;
    padding: 20px 24px;
    font-family: var(--mono); font-size: 13px; line-height: 1.8;
    overflow-y: auto; overflow-x: auto;
    white-space: pre;
    min-height: 520px;
    scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
  }
  #logOutput::-webkit-scrollbar { width: 6px; height: 6px; }
  #logOutput::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── LOG COLORS ── */
  .c-green   { color: var(--green); }
  .c-cyan    { color: var(--cyan); }
  .c-yellow  { color: var(--yellow); }
  .c-red     { color: var(--red); }
  .c-gray    { color: var(--gray2); }
  .c-magenta { color: var(--magenta); }
  .c-orange  { color: var(--orange); }
  .c-sep     { color: var(--border2); }
  .c-white   { color: var(--white); }
  .c-bold    { font-weight: 700; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--red); border-radius: 10px;
    padding: 12px 24px; font-family: var(--mono); font-size: 13px; color: var(--red);
    z-index: 999; display: none; animation: toastIn .25s ease;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }
  @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(10px); } }
  #toast.ok { border-color: var(--green); color: var(--green); }


</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <h1>Implementación algoritmo RSA</h1>
    </div>
  </header>

  <!-- MAIN LAYOUT -->
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">⬡ Parámetros</div>

      <!-- STEP 1: p -->
      <div class="step-block active" id="step1">
        <div class="step-label">
          <div class="step-num">1</div>
          <div class="step-title">Número primo &nbsp;<span style="color:var(--green)">p</span></div>
        </div>
        <input class="step-input" type="number" id="inp_p" placeholder="ej. 19" min="2">
        <button class="step-btn cyan" onclick="setP()">Validar y establecer p →</button>
        <div class="step-done-badge">
          <span>✓</span> <span class="done-value" id="done_p"></span>
        </div>
      </div>

      <!-- STEP 2: q -->
      <div class="step-block disabled" id="step2">
        <div class="step-label">
          <div class="step-num">2</div>
          <div class="step-title">Número primo &nbsp;<span style="color:var(--green)">q</span>&nbsp; (≠ p)</div>
        </div>
        <input class="step-input" type="number" id="inp_q" placeholder="ej. 23" min="2">
        <button class="step-btn cyan" onclick="setQ()">Validar y establecer q →</button>
        <div class="step-done-badge">
          <span>✓</span> <span class="done-value" id="done_q"></span>
        </div>
      </div>

      <!-- STEP 3: e -->
      <div class="step-block disabled" id="step3">
        <div class="step-label">
          <div class="step-num">3</div>
          <div class="step-title">Elegir &nbsp;<span style="color:var(--yellow)">e</span>&nbsp; de la lista</div>
        </div>
        <input class="step-input" type="number" id="inp_e" placeholder="ej. 17" min="2">
        <button class="step-btn yellow" onclick="setE()">Confirmar e → calcular k y d</button>
        <div class="step-done-badge">
          <span>✓</span> <span class="done-value" id="done_e"></span>
        </div>
      </div>

      <!-- RESULT -->
      <div class="result-card" id="resultCard">
        <div class="result-title">Resultado Final</div>
        <div class="result-row"><span class="lbl">n =</span> <span class="val c-white"  id="res_n">—</span></div>
        <div class="result-row"><span class="lbl">e =</span> <span class="val c-yellow" id="res_e">—</span></div>
        <div class="result-row"><span class="lbl">k =</span> <span class="val c-orange" id="res_k">—</span></div>
        <div class="result-row"><span class="lbl">d =</span> <span class="val c-green"  id="res_d">—</span></div>
        <div class="result-divider"></div>
        <div class="key-pub"  id="res_pub">—</div>
        <div class="key-priv" id="res_priv">—</div>
      </div>

      <button class="reset-btn" onclick="resetAll()">↺ Reiniciar</button>
    </aside>

    <!-- LOG PANEL -->
    <div class="log-panel">
      <div class="log-header">
        <div class="log-dots">
          <div class="dot dot-r"></div>
          <div class="dot dot-y"></div>
          <div class="dot dot-g"></div>
        </div>
        <div class="log-title">Procedimiento</div>
        <div style="width:54px"></div>
      </div>
      <div id="logOutput"></div>
    </div>
  </div>



</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  MATEMÁTICAS
// ═══════════════════════════════════════════

function esPrimo(n) {
  n = parseInt(n);
  if (n < 2) return false;
  if (n === 2) return true;
  if (n % 2 === 0) return false;
  for (let i = 3; i <= Math.sqrt(n); i += 2)
    if (n % i === 0) return false;
  return true;
}

function mcd(a, b) {
  while (b) { [a, b] = [b, a % b]; }
  return a;
}

function posiblesE(phi) {
  const result = [];
  for (let e = 2; e < phi; e++)
    if (mcd(e, phi) === 1) result.push(e);
  return result;
}

function calcularKTabla(e, phi, limite = 20) {
  const filas = [];
  let encontrado = null;
  for (let k = 1; k <= limite; k++) {
    const kphi1 = k * phi + 1;
    const resto  = kphi1 % e;
    filas.push({ k, e, kphi1, resto });
    if (resto === 0 && encontrado === null) encontrado = k;
  }
  return { filas, encontrado };
}

// ═══════════════════════════════════════════
//  ESTADO
// ═══════════════════════════════════════════
let P = null, Q = null, N = null, PHI = null,
    E = null, K = null, D = null;

// ═══════════════════════════════════════════
//  LOG
// ═══════════════════════════════════════════

const logEl = document.getElementById('logOutput');

function logClear() { logEl.innerHTML = ''; }

function logLine(text = '', cls = 'c-white') {
  const span = document.createElement('span');
  span.className = cls;
  span.textContent = text + '\n';
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}

function logSep() { logLine('─'.repeat(70), 'c-sep'); }

function logSegments(segments) {
  // segments: [{text, cls}]
  const line = document.createElement('span');
  segments.forEach(({ text, cls }) => {
    const s = document.createElement('span');
    s.className = cls || 'c-white';
    s.textContent = text;
    line.appendChild(s);
  });
  const nl = document.createTextNode('\n');
  line.appendChild(nl);
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

function logWelcome() {
  logLine('  RSA — ALGORITMO CRIPTOGRÁFICO', 'c-cyan c-bold');
  logSep();
  logLine('  Ingresa los valores de p y q en el panel izquierdo.', 'c-gray');
  logLine('  El programa mostrará cada paso del proceso.', 'c-gray');
  logSep();
}

// ═══════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════
let toastTimer;
function toast(msg, ok = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = ok ? 'ok' : '';
  t.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.style.display = 'none', 3200);
}

// ═══════════════════════════════════════════
//  STEP HELPERS
// ═══════════════════════════════════════════
function activateStep(id) {
  document.getElementById(id).className = 'step-block active';
}
function doneStep(id, val) {
  const el = document.getElementById(id);
  el.className = 'step-block done';
  el.querySelector('.done-value').textContent = val;
}
function disableStep(id) {
  document.getElementById(id).className = 'step-block disabled';
}

// ═══════════════════════════════════════════
//  PASO 1 — p
// ═══════════════════════════════════════════
function setP() {
  const val = parseInt(document.getElementById('inp_p').value);
  const inp  = document.getElementById('inp_p');
  if (!val || isNaN(val)) { inp.className = 'step-input error'; toast('Ingresa un número entero.'); return; }
  if (!esPrimo(val))       { inp.className = 'step-input error'; toast(`${val} no es un número primo.`); return; }

  P = val;
  inp.className = 'step-input ok';
  doneStep('step1', `p = ${val}`);
  activateStep('step2');
  document.getElementById('inp_q').focus();

  logSep();
  logSegments([{ text: `  p  =  ${val}`, cls: 'c-green c-bold' }]);
  logLine(`  ✔  ${val} es primo.`, 'c-gray');
  logSep();
  logLine('  Ahora ingresa q (primo diferente a p).', 'c-gray');
}

// ═══════════════════════════════════════════
//  PASO 2 — q
// ═══════════════════════════════════════════
function setQ() {
  const val = parseInt(document.getElementById('inp_q').value);
  const inp  = document.getElementById('inp_q');
  if (!val || isNaN(val)) { inp.className = 'step-input error'; toast('Ingresa un número entero.'); return; }
  if (!esPrimo(val))       { inp.className = 'step-input error'; toast(`${val} no es un número primo.`); return; }
  if (val === P)            { inp.className = 'step-input error'; toast('q debe ser diferente a p.'); return; }

  Q   = val;
  N   = P * Q;
  PHI = (P - 1) * (Q - 1);
  const listaE = posiblesE(PHI);

  inp.className = 'step-input ok';
  doneStep('step2', `q = ${val}`);
  activateStep('step3');
  document.getElementById('inp_e').focus();

  logLine(`  q  =  ${val}`, 'c-green c-bold');
  logLine(`  ✔  ${val} es primo.`, 'c-gray');
  logSep();
  logSegments([{ text: `  n  =  p × q  =  ${P} × ${Q}  =  ${N}`, cls: 'c-cyan' }]);
  logSegments([{ text: `  ø(n)  =  (p‑1) × (q‑1)  =  ${P-1} × ${Q-1}  =  ${PHI}`, cls: 'c-cyan' }]);
  logSep();
  logLine('  MCD(e, ø(n)) == 1   →   posibles e:', 'c-yellow');

  // mostrar lista en líneas de ~72 chars
  let linea = '  ';
  listaE.forEach((e, i) => {
    if ((linea + e).length > 72) { logLine(linea, 'c-white'); linea = '  '; }
    linea += e;
    if (i < listaE.length - 1) linea += ', ';
  });
  if (linea.trim()) logLine(linea, 'c-white');

  logSep();
  logLine('  Elige un valor de e de la lista anterior.', 'c-gray');
}

// ═══════════════════════════════════════════
//  PASO 3 — e → k automático → d
// ═══════════════════════════════════════════
function setE() {
  const val = parseInt(document.getElementById('inp_e').value);
  const inp  = document.getElementById('inp_e');
  if (!val || isNaN(val)) { inp.className = 'step-input error'; toast('Ingresa un número entero.'); return; }
  if (!(val > 1 && val < PHI)) {
    inp.className = 'step-input error';
    toast(`e debe cumplir 1 < e < ø(n) = ${PHI}.`);
    return;
  }
  if (mcd(val, PHI) !== 1) {
    inp.className = 'step-input error';
    toast(`MCD(${val}, ${PHI}) ≠ 1. Elige un e de la lista.`);
    return;
  }

  E = val;
  inp.className = 'step-input ok';

  // verificación de e
  logLine(`  e  =  ${E}`, 'c-green c-bold');
  logLine(`  1 < e < ø(n)   →   1 < ${E} < ${PHI}`, 'c-white');
  logLine(`  MCD(e, ø(n))  =  MCD(${E}, ${PHI})  =  ${mcd(E,PHI)}`, 'c-white');
  logSep();

  // tabla de k
  const { filas, encontrado } = calcularKTabla(E, PHI);

  logLine(
    `  ${'k'.padEnd(5)}  ${'e'.padEnd(6)}  ${'(k × ø(n) + 1)'.padEnd(22)}  (k × ø(n) + 1) % e`,
    'c-cyan'
  );
  logLine('  ' + '─'.repeat(64), 'c-sep');

  filas.forEach(({ k, e, kphi1, resto }) => {
    const marker = (resto === 0 && k === encontrado) ? '  ◄ k encontrado' : (resto === 0 ? '  ◄' : '');
    const line = `  k = ${String(k).padEnd(4)}  e = ${String(e).padEnd(4)}  ` +
                 `(k × ø(n) + 1) = ${String(kphi1).padEnd(12)}  ` +
                 `(k × ø(n) + 1) % e = ${resto}${marker}`;
    logLine(line, resto === 0 ? 'c-green' : 'c-white');
  });
  logSep();

  if (encontrado === null) { toast('No se encontró k en 20 iteraciones. Prueba otro e.'); return; }

  K = encontrado;
  const kphi1 = 1 + K * PHI;
  D = kphi1 / E;

  logLine(`  k  =  ${K}  (calculado automáticamente)`, 'c-yellow');
  logLine(`  k > 0  ✔`, 'c-white');
  logLine(`  (1 + k × ø(n)) % e  =  (1 + ${K} × ${PHI}) % ${E}  =  ${kphi1} % ${E}  =  ${kphi1 % E}`, 'c-white');
  logSep();
  logLine(`  d  =  (1 + k × ø(n)) / e`, 'c-cyan');
  logLine(`  d  =  (1 + ${K} × ${PHI}) / ${E}  =  ${kphi1} / ${E}  =  ${D}`, 'c-cyan');
  logSep();

  logLine('  ┌───────────────────────────────────────────────┐', 'c-green');
  logLine(`  │  Llave pública   =  [ n = ${String(N).padStart(6)}, e = ${String(E).padStart(4)} ]       │`, 'c-green');
  logLine(`  │  Llave privada   =  [ n = ${String(N).padStart(6)}, d = ${String(D).padStart(4)} ]       │`, 'c-magenta');
  logLine('  └───────────────────────────────────────────────┘', 'c-green');
  logSep();

  doneStep('step3', `e = ${E}`);
  showResult();
  toast('¡Llaves generadas correctamente!', true);
}

// ═══════════════════════════════════════════
//  RESULTADO FINAL
// ═══════════════════════════════════════════
function showResult() {
  document.getElementById('res_n').textContent = N;
  document.getElementById('res_e').textContent = E;
  document.getElementById('res_k').textContent = K;
  document.getElementById('res_d').textContent = D;
  document.getElementById('res_pub').textContent  = `Pública  [ n=${N}, e=${E} ]`;
  document.getElementById('res_priv').textContent = `Privada  [ n=${N}, d=${D} ]`;
  document.getElementById('resultCard').classList.add('visible');
}

// ═══════════════════════════════════════════
//  RESET
// ═══════════════════════════════════════════
function resetAll() {
  P = Q = N = PHI = E = K = D = null;
  ['inp_p','inp_q','inp_e'].forEach(id => {
    const el = document.getElementById(id);
    el.value = '';
    el.className = 'step-input';
  });
  activateStep('step1');
  disableStep('step2');
  disableStep('step3');
  document.getElementById('resultCard').classList.remove('visible');
  logClear();
  logWelcome();
  document.getElementById('inp_p').focus();
}

// Enter key shortcuts
['inp_p','inp_q','inp_e'].forEach((id, i) => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') [setP, setQ, setE][i]();
  });
});

// INIT
logWelcome();
</script>
</body>
</html>
